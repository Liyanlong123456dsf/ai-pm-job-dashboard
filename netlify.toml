[build]
  publish = "dist"

# Kimi Code API 代理（服务端转发，绕过 CORS）
[[redirects]]
  from = "/api/kimi/*"
  to = "https://api.kimi.com/coding/v1/:splat"
  status = 200
  force = true
  headers = {X-From = "netlify-proxy"}

# Coze API 代理
[[redirects]]
  from = "/api/coze/*"
  to = "https://api.coze.cn/v3/:splat"
  status = 200
  force = true

# 岗位数据 API（供扣子 Bot API 插件调用）
[[edge_functions]]
  path = "/api/jobs"
  function = "jobs-api"

[[edge_functions]]
  path = "/api/jobs/stats"
  function = "jobs-api"

# CORS Edge Function（允许 GitHub Pages 等外部域名调用 API 代理）
[[edge_functions]]
  path = "/api/kimi/*"
  function = "cors-proxy"

[[edge_functions]]
  path = "/api/coze/*"
  function = "cors-proxy"

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/job_dashboard.html"
  status = 200
